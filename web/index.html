<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naruto Jutsu Knowledge Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a12;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, rgba(255,107,53,0.15) 0%, transparent 100%);
            border-bottom: 1px solid #FF6B35;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .header h1 {
            font-size: 1.4rem;
            color: #FF6B35;
        }
        
        .header h1 span { color: #fff; }
        
        .stats {
            color: #666;
            font-size: 0.85rem;
        }
        
        .stats b { color: #FF6B35; }
        
        .search-box {
            margin-left: auto;
        }
        
        .search-box input {
            padding: 8px 16px;
            border: 1px solid #444;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 0.9rem;
            width: 250px;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #FF6B35;
        }
        
        .container {
            display: flex;
            height: calc(100vh - 50px);
        }
        
        #cy {
            flex: 1;
            background: radial-gradient(ellipse at center, #12121f 0%, #0a0a12 100%);
        }
        
        .side-panel {
            width: 300px;
            background: rgba(0,0,0,0.6);
            border-left: 1px solid #222;
            padding: 15px;
            overflow-y: auto;
        }
        
        .panel-section h3 {
            color: #FF6B35;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        #details-panel {
            display: none;
            margin-bottom: 20px;
        }
        
        .jutsu-name {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .jutsu-types {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .type-tag {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            background: rgba(255,107,53,0.2);
            border: 1px solid #FF6B35;
            cursor: pointer;
        }
        
        .jutsu-desc {
            font-size: 0.8rem;
            color: #999;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .legend-item:hover { background: rgba(255,255,255,0.05); }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .legend-name { flex: 1; color: #aaa; }
        .legend-count { color: #555; font-size: 0.75rem; }
        
        .controls {
            position: fixed;
            bottom: 15px;
            left: 15px;
            display: flex;
            gap: 6px;
        }
        
        .controls button {
            padding: 6px 12px;
            border: 1px solid #333;
            border-radius: 4px;
            background: rgba(0,0,0,0.8);
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .controls button:hover {
            background: #FF6B35;
            color: #fff;
            border-color: #FF6B35;
        }
        
        .loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #FF6B35;
            font-size: 1.2rem;
        }
        
        .hint {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🍥 <span>Naruto</span> Jutsu Graph</h1>
        <div class="stats">
            <b id="s-jutsu">0</b> jutsus · <b id="s-types">0</b> types · <b id="s-edges">0</b> connections
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search jutsu...">
        </div>
    </header>
    
    <div class="container">
        <div id="cy"></div>
        
        <div class="side-panel">
            <div id="details-panel" class="panel-section">
                <h3>Selected</h3>
                <div class="jutsu-name" id="d-name"></div>
                <div class="jutsu-types" id="d-types"></div>
                <div class="jutsu-desc" id="d-desc"></div>
            </div>
            
            <div class="panel-section">
                <h3>Types</h3>
                <div id="legend"></div>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="fit()">Fit</button>
        <button onclick="cy.zoom(cy.zoom()*1.5)">+</button>
        <button onclick="cy.zoom(cy.zoom()/1.5)">−</button>
        <button onclick="random()">🎲</button>
        <button onclick="toggleEdges()">Toggle Edges</button>
    </div>
    
    <div class="hint">Drag to pan · Scroll to zoom · Click node for details</div>
    
    <div class="loading" id="loading">Loading graph...</div>

    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    
    <script>
        let cy, data;
        let edgesVisible = true;
        
        const colors = {
            "Ninjutsu": "#FF6B35", "Taijutsu": "#2E8B57", "Genjutsu": "#9932CC",
            "Kekkei Genkai": "#DC143C", "Hiden": "#4169E1", "Dōjutsu": "#FF4444",
            "Kenjutsu": "#A0A0A0", "Fūinjutsu": "#FFD700", "Senjutsu": "#32CD32",
            "Kinjutsu": "#8B0000", "Bukijutsu": "#708090", "Medical Ninjutsu": "#00CED1",
            "Space–Time Ninjutsu": "#9400D3", "Cooperation Ninjutsu": "#7CFC00",
            "Clone Techniques": "#FFA500", "Chakra Flow": "#00FFFF",
            "Shurikenjutsu": "#B8860B", "Barrier Ninjutsu": "#1E90FF",
            "Collaboration Techniques": "#98FB98", "Chakra Absorption Techniques": "#FF69B4",
            "Juinjutsu": "#4B0082", "Fighting Style": "#DAA520", "Shinjutsu": "#DDA0DD",
            "Scientific Ninja Tool Techniques": "#00FA9A", "Kekkei Mōra": "#F0F0F0",
            "Reincarnation Ninjutsu": "#6A5ACD", "Regeneration Techniques": "#ADFF2F"
        };
        
        function getColor(type) { return colors[type] || "#666"; }
        
        async function init() {
            const res = await fetch('/api/graph');
            data = await res.json();
            
            document.getElementById('s-jutsu').textContent = data.stats.total_jutsus;
            document.getElementById('s-types').textContent = data.stats.total_types;
            
            buildGraph();
            buildLegend();
            
            document.getElementById('loading').style.display = 'none';
            
            document.getElementById('search').oninput = (e) => search(e.target.value);
        }
        
        function buildGraph() {
            const elements = [];
            const typePos = {};
            const typeIds = {};
            
            // Position types in a large circle
            const types = data.nodes.filter(n => n.type === 'category');
            const R = Math.max(500, types.length * 30);
            
            types.forEach((t, i) => {
                const angle = (2 * Math.PI * i) / types.length;
                const x = R * Math.cos(angle);
                const y = R * Math.sin(angle);
                typePos[t.label] = { x, y, count: 0 };
                typeIds[t.label] = t.id;
                
                elements.push({
                    data: {
                        id: t.id,
                        label: t.label,
                        color: t.color,
                        nodeType: 'type',
                        count: t.count
                    },
                    position: { x, y }
                });
            });
            
            // Position jutsus around their primary type in spiral
            const jutsus = data.nodes.filter(n => n.type === 'jutsu');
            let edgeCount = 0;
            
            jutsus.forEach(j => {
                const primaryType = j.jutsu_types?.[0];
                const pos = typePos[primaryType];
                if (!pos) return;
                
                const idx = pos.count++;
                // Spiral outward
                const angle = idx * 0.5;
                const dist = 60 + idx * 1.5;
                
                elements.push({
                    data: {
                        id: j.id,
                        label: j.label,
                        color: j.color,
                        nodeType: 'jutsu',
                        types: j.jutsu_types,
                        desc: j.full_description || j.description
                    },
                    position: {
                        x: pos.x + dist * Math.cos(angle),
                        y: pos.y + dist * Math.sin(angle)
                    }
                });
                
                // Add edges to ALL types this jutsu belongs to
                (j.jutsu_types || []).forEach(typeName => {
                    const typeId = typeIds[typeName];
                    if (typeId) {
                        elements.push({
                            data: {
                                id: `e-${j.id}-${typeId}`,
                                source: j.id,
                                target: typeId,
                                color: getColor(typeName)
                            }
                        });
                        edgeCount++;
                    }
                });
            });
            
            document.getElementById('s-edges').textContent = edgeCount;
            
            cy = cytoscape({
                container: document.getElementById('cy'),
                elements: elements,
                style: [
                    {
                        selector: 'node[nodeType="type"]',
                        style: {
                            'width': 70,
                            'height': 70,
                            'background-color': 'data(color)',
                            'label': 'data(label)',
                            'color': '#fff',
                            'font-size': '11px',
                            'font-weight': 'bold',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'text-wrap': 'wrap',
                            'text-max-width': '65px',
                            'text-outline-color': '#000',
                            'text-outline-width': 2,
                            'border-width': 3,
                            'border-color': '#000',
                            'z-index': 10
                        }
                    },
                    {
                        selector: 'node[nodeType="jutsu"]',
                        style: {
                            'width': 10,
                            'height': 10,
                            'background-color': 'data(color)',
                            'border-width': 1,
                            'border-color': 'rgba(0,0,0,0.5)'
                        }
                    },
                    {
                        selector: 'node[nodeType="jutsu"]:selected, node[nodeType="jutsu"].hover',
                        style: {
                            'width': 20,
                            'height': 20,
                            'label': 'data(label)',
                            'font-size': '10px',
                            'color': '#fff',
                            'text-outline-color': '#000',
                            'text-outline-width': 1,
                            'text-valign': 'top',
                            'text-margin-y': -8,
                            'border-color': '#FFD700',
                            'border-width': 3,
                            'z-index': 100
                        }
                    },
                    {
                        selector: 'node.highlight',
                        style: {
                            'border-color': '#FFD700',
                            'border-width': 3
                        }
                    },
                    {
                        selector: 'node.dim',
                        style: {
                            'opacity': 0.1
                        }
                    },
                    {
                        selector: 'node[nodeType="type"]:selected',
                        style: {
                            'border-color': '#FFD700',
                            'border-width': 5
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 0.5,
                            'line-color': 'data(color)',
                            'opacity': 0.15,
                            'curve-style': 'straight'
                        }
                    },
                    {
                        selector: 'edge.highlight',
                        style: {
                            'width': 2,
                            'opacity': 0.8,
                            'z-index': 100
                        }
                    },
                    {
                        selector: 'edge.dim',
                        style: {
                            'opacity': 0.02
                        }
                    }
                ],
                layout: { name: 'preset' },
                wheelSensitivity: 0.2,
                minZoom: 0.03,
                maxZoom: 4
            });
            
            // Events
            cy.on('tap', 'node', function(e) {
                const node = e.target;
                showDetails(node.data());
                highlightConnected(node);
            });
            
            cy.on('mouseover', 'node[nodeType="jutsu"]', function(e) {
                e.target.addClass('hover');
            });
            
            cy.on('mouseout', 'node[nodeType="jutsu"]', function(e) {
                e.target.removeClass('hover');
            });
            
            cy.on('tap', function(e) {
                if (e.target === cy) {
                    clearHighlight();
                    document.getElementById('details-panel').style.display = 'none';
                }
            });
            
            fit();
        }
        
        function highlightConnected(node) {
            clearHighlight();
            
            // Get connected edges and nodes
            const connectedEdges = node.connectedEdges();
            const connectedNodes = connectedEdges.connectedNodes();
            
            // Dim everything first
            cy.elements().addClass('dim');
            
            // Highlight the selected node, connected nodes, and edges
            node.removeClass('dim').addClass('highlight');
            connectedNodes.removeClass('dim').addClass('highlight');
            connectedEdges.removeClass('dim').addClass('highlight');
        }
        
        function showDetails(d) {
            const panel = document.getElementById('details-panel');
            panel.style.display = 'block';
            
            document.getElementById('d-name').textContent = d.label;
            
            const typesDiv = document.getElementById('d-types');
            typesDiv.innerHTML = '';
            
            if (d.nodeType === 'type') {
                typesDiv.innerHTML = `<span class="type-tag" style="border-color:${d.color}">${d.count} jutsus</span>`;
                document.getElementById('d-desc').textContent = 'Click to see all connected jutsus highlighted.';
            } else {
                (d.types || []).forEach(t => {
                    const tag = document.createElement('span');
                    tag.className = 'type-tag';
                    tag.textContent = t;
                    tag.style.borderColor = getColor(t);
                    tag.onclick = () => focusType(t);
                    typesDiv.appendChild(tag);
                });
                document.getElementById('d-desc').textContent = d.desc || 'No description.';
            }
        }
        
        function clearHighlight() {
            cy.elements().removeClass('dim highlight');
        }
        
        function focusType(typeName) {
            const typeNode = cy.nodes().filter(n => n.data('label') === typeName && n.data('nodeType') === 'type');
            if (typeNode.length) {
                cy.animate({ center: { eles: typeNode }, zoom: 0.5 }, { duration: 300 });
                showDetails(typeNode[0].data());
                highlightConnected(typeNode[0]);
            }
        }
        
        function buildLegend() {
            const legend = document.getElementById('legend');
            Object.entries(data.stats.type_distribution).forEach(([type, count]) => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                div.innerHTML = `
                    <span class="legend-dot" style="background:${getColor(type)}"></span>
                    <span class="legend-name">${type}</span>
                    <span class="legend-count">${count}</span>
                `;
                div.onclick = () => focusType(type);
                legend.appendChild(div);
            });
        }
        
        function search(q) {
            clearHighlight();
            if (!q || q.length < 2) return;
            
            const ql = q.toLowerCase();
            let found = null;
            
            cy.elements().addClass('dim');
            
            cy.nodes().forEach(n => {
                if (n.data('label').toLowerCase().includes(ql)) {
                    n.removeClass('dim').addClass('highlight');
                    n.connectedEdges().removeClass('dim').addClass('highlight');
                    if (!found) found = n;
                }
            });
            
            if (found) {
                cy.animate({ center: { eles: found }, zoom: 1.5 }, { duration: 300 });
                showDetails(found.data());
            }
        }
        
        function fit() {
            cy.fit(50);
        }
        
        function toggleEdges() {
            edgesVisible = !edgesVisible;
            if (edgesVisible) {
                cy.edges().style('display', 'element');
            } else {
                cy.edges().style('display', 'none');
            }
        }
        
        function random() {
            const jutsus = cy.nodes().filter(n => n.data('nodeType') === 'jutsu');
            const r = jutsus[Math.floor(Math.random() * jutsus.length)];
            if (r) {
                clearHighlight();
                highlightConnected(r);
                cy.animate({ center: { eles: r }, zoom: 1.5 }, { duration: 300 });
                showDetails(r.data());
            }
        }
        
        init();
    </script>
</body>
</html>
